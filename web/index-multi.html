<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Labori - Multichannel</title>
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <link href="/assets/style-multi.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body>

    <div id="monitor_wrapper" class="wrapper">
      <div class="graph_box">
        <div id="monitor0" class="graph"></div>
        <div id="monitor1" class="graph"></div>
        <div id="monitor2" class="graph"></div>
        <div id="monitor3" class="graph"></div>
        <div id="monitor4" class="graph"></div>
        <div id="monitor5" class="graph"></div>
      </div>
    </div>

    <div id="monitor_handler" class="handler">
      <div id="select_box" class="select_box">
        <label for="interval_select" class="label">Set Interval</label>
        <select id="interval_select">
          <option value="10.0E+0">10 sec</option>
          <option value="1.0E+0">1 sec</option>
          <option value="0.10E+0">100 msec</option>
          <option value="10E-3">10 msec</option>
          <option value="1.0E-3">1 msec</option>
        </select>
        <fieldset class="channel_selector">
          <legend>Channels</legend>
          <label><input type="checkbox" name="channel" value="0" checked> CH0</label>
          <label><input type="checkbox" name="channel" value="1" checked> CH1</label>
          <label><input type="checkbox" name="channel" value="2" checked> CH2</label>
          <label><input type="checkbox" name="channel" value="3" checked> CH3</label>
          <label><input type="checkbox" name="channel" value="4"> CH4</label>
          <label><input type="checkbox" name="channel" value="5"> CH5</label>
        </fieldset>
      </div>
      <div id="button_box" class="button_box">
        <button id="run" class="my_button" type="button">Run</button>
        <button id="stop" class="my_button" type="button">Stop</button>
      </div>
      <div id="indicator_wrapper" class="wrapper">
        <table>
          <tr>
              <th><label for="socket" class="label_left">Connection:</label></th>
              <td><input type="text" value="waiting..." id="socket" class="field_left" readonly></td>
          </tr>
          <tr>
              <th><label for="response_field" class="label_left">Response:&nbsp;&nbsp;</label></th>
              <td><input type="text" value="" id="response_field" class="field_left" readonly></td>
          </tr>
        </table>
      </div>
    </div>

    <div id="history_wrapper" class="wrapper">
      <div class="graph_box">
        <div id="history0" class="graph"></div>
        <div id="history1" class="graph"></div>
        <div id="history2" class="graph"></div>
        <div id="history3" class="graph"></div>
        <div id="history4" class="graph"></div>
        <div id="history5" class="graph"></div>
      </div>
      <div id="history_handler" class="handler">
        <div id="history_select_box" class="select_box">
          <select id="history_select" size="11"></select>
        </div>
        <div id="history_button_box" class="button_box">
          <button id="save_csv_history" class="my_button" type="button">Save as CSV</button>
          <button id="remove" class="my_button danger" type="button">Remove Data</button>
        </div>
      </div>
    </div>

    <script src="/assets/plotly-2.12.1.min.js"></script>
    <script src="/assets/client-multi.js"></script>
    
  </body>
</html>
