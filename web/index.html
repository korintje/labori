<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Labori - Single channel</title>
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <link href="/assets/style.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body>

    <div id="monitor_wrapper" class="wrapper">
      <div class="graph_box">
        <div id="monitor" class="graph"></div>
      </div>
      <div id="monitor_handler" class="handler control_panel">
        <div class="select_box">
          <label for="measurement_mode" class="label">Measurement Method</label>
          <select id="measurement_mode">
            <option value="single_direct" selected>:MEAS? direct (accurate elapsed time)</option>
            <option value="single_log">Instrument log (higher throughput)</option>
          </select>
          <label for="gate_select" class="label">Gate Time</label>
          <select id="gate_select">
            <option value="10.0E+0">10 sec</option>
            <option value="1.0E+0">1 sec</option>
            <option value="0.10E+0">100 msec</option>
            <option value="10E-3">10 msec</option>
            <option value="1.0E-3">1 msec</option>
            <option value="0.10E-3">100 usec</option>
            <option value="10E-6">10 usec</option>
          </select>
          <label for="period_select" class="label">Start Period</label>
          <select id="period_select">
            <option value="">Fastest possible</option>
            <option value="10.0">10 sec</option>
            <option value="1.0">1 sec</option>
            <option value="0.1">100 msec</option>
            <option value="0.01">10 msec</option>
            <option value="0.001">1 msec</option>
          </select>
          <label for="session_title" class="label">Measurement Name</label>
          <input id="session_title" class="text_input" type="text" placeholder="e.g. BSA adsorption run 1">
          <label for="sample_name" class="label">Sample</label>
          <input id="sample_name" class="text_input" type="text" placeholder="e.g. 1 mg/mL BSA">
          <label for="session_note" class="label">Note</label>
          <textarea id="session_note" class="text_area" rows="3" placeholder="Buffer, flow rate, crystal ID, temperature..."></textarea>
        </div>
        <div class="button_box">
          <button id="run" class="my_button" type="button">Run</button>
          <button id="stop" class="my_button" type="button">Stop</button>
        </div>
      </div>
    </div>

    <div id="qcm_wrapper" class="wrapper">
      <div class="qcm_panel">
        <h2>QCM Tools</h2>
        <div class="qcm_grid">
          <label>
            Display
            <select id="display_mode">
              <option value="frequency">Frequency</option>
              <option value="delta">Δf from baseline</option>
            </select>
          </label>
          <button id="set_baseline" class="small_button" type="button">Use visible/loaded data as baseline</button>
          <button id="clear_baseline" class="small_button" type="button">Clear baseline</button>
          <label>
            Event
            <select id="event_kind">
              <option value="injection">Injection</option>
              <option value="wash">Wash</option>
              <option value="buffer">Buffer exchange</option>
              <option value="baseline">Baseline</option>
              <option value="note">Note</option>
            </select>
          </label>
          <input id="event_message" class="text_input" type="text" placeholder="Event note">
          <button id="add_event" class="small_button" type="button">Add Event</button>
        </div>
        <div id="stats" class="stats_box">No data loaded.</div>
        <div id="event_list" class="event_list"></div>
      </div>
    </div>

    <div id="history_wrapper" class="wrapper">
      <div class="graph_box">
        <div id="history" class="graph"></div>
      </div>
      <div id="history_handler" class="handler">
        <div class="select_box">
          <select id="history_select" size="11"></select>
        </div>
        <div class="button_box">
          <button id="save_csv_history" class="my_button" type="button">Save as CSV</button>
          <button id="remove" class="my_button danger" type="button">Remove Data</button>
        </div>
      </div>
    </div>

    <div id="indicator_wrapper" class="wrapper">
      <table>
        <tr>
            <th><label for="socket" class="label_left">Connection:</label></th>
            <td><input type="text" value="waiting..." id="socket" class="field_left" readonly></td>
        </tr>
        <tr>
            <th><label for="response_field" class="label_left">Response:&nbsp;&nbsp;</label></th>
            <td><input type="text" value="" id="response_field" class="field_left" readonly></td>
        </tr>
      </table>
    </div>

    <script src="/assets/plotly-2.12.1.min.js"></script>
    <script src="/assets/client.js"></script>
    
  </body>
</html>
